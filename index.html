<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .info {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
        }

        .info strong {
            color: #333;
        }

        .videos-list {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
        }

        .videos-list h2 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #333;
        }

        .video-item {
            padding: 12px;
            background: #f9f9f9;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .video-item a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .video-item a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎬 YouTube Downloader</h1>
        <p class="subtitle">Download videos using GitHub Actions</p>

        <form id="downloadForm">
            <div class="form-group">
                <label for="videoUrl">YouTube Video URL</label>
                <input type="url" id="videoUrl" placeholder="https://www.youtube.com/watch?v=..." required>
            </div>

            <div class="form-group">
                <label for="quality">Video Quality</label>
                <select id="quality" required>
                    <option value="highest">Highest Available</option>
                    <option value="720p" selected>720p</option>
                    <option value="480p">480p</option>
                    <option value="360p">360p</option>
                </select>
            </div>

            <button type="submit">Download Video</button>
        </form>

        <div class="info">
            <strong>How it works:</strong><br>
            1. Enter a YouTube URL<br>
            2. Click "Download Video"<br>
            3. GitHub Actions will download it<br>
            4. Video will be saved in the <code>videos/</code> folder
        </div>

        <div class="videos-list" id="videosList" style="display: none;">
            <h2>Downloaded Videos</h2>
            <div id="videosContainer"></div>
        </div>
    </div>

    <script>
        const GITHUB_USERNAME = 'Geminiixd'; // Replace with your username
        const REPO_NAME = 'Youtube-downloader'; // Replace with your repo name
        const WORKFLOW_ID = 'download-video.yml';

        document.getElementById('downloadForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const videoUrl = document.getElementById('videoUrl').value;
            const quality = document.getElementById('quality').value;

            const actionUrl = `https://github.com/${GITHUB_USERNAME}/${REPO_NAME}/actions/workflows/${WORKFLOW_ID}`;

            alert(`Opening GitHub Actions...\n\nYou'll need to:\n1. Click "Run workflow"\n2. Paste URL: ${videoUrl}\n3. Select quality: ${quality}\n4. Click "Run workflow" button`);

            window.open(actionUrl, '_blank');
        });

        // Load and display downloaded videos
        async function loadVideos() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/videos`);
                const files = await response.json();

                if (files.length > 0) {
                    document.getElementById('videosList').style.display = 'block';
                    const container = document.getElementById('videosContainer');
                    container.innerHTML = files
                        .filter(file => file.type === 'file')
                        .map(file => `
                            <div class="video-item">
                                <span>${file.name}</span>
                                <a href="${file.download_url}" download>Download</a>
                            </div>
                        `).join('');
                }
            } catch (err) {
                console.log('No videos yet or error loading');
            }
        }

        loadVideos();
    </script>
</body>

</html>
