name: Download YouTube Video

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: true
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip curl
          pip3 install -U yt-dlp
      
      - name: Create cookies file
        env:
          COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$COOKIES" ]; then
            echo "$COOKIES" > cookies.txt
          fi
      
      - name: Create videos directory
        run: mkdir -p videos
      
      - name: Download video
        run: |
          cd videos
          if [ -f ../cookies.txt ]; then
            yt-dlp \
              --extractor-args "youtube:player_client=ios" \
              --cookies ../cookies.txt \
              -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
              --merge-output-format mp4 \
              -o "%(title)s.%(ext)s" \
              "${{ github.event.inputs.video_url }}"
          else
            yt-dlp \
              --extractor-args "youtube:player_client=ios" \
              -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
              --merge-output-format mp4 \
              -o "%(title)s.%(ext)s" \
              "${{ github.event.inputs.video_url }}"
          fi
      
      - name: Cleanup cookies
        if: always()
        run: rm -f cookies.txt
      
      - name: Commit and push
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git add videos/
          git commit -m "Add downloaded video: ${{ github.event.inputs.video_url }}" || echo "No changes to commit"
          git push
